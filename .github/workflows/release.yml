name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        id: release
        with:
          draft: true
          generate_release_notes: true

  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Archive
        shell: bash
        run: |
          BIN="betterssh"
          TARGET="${{ matrix.target }}"
          EXT=""; [[ "$TARGET" == *"windows"* ]] && EXT=".exe"
          DIR="${BIN}-${TARGET}"
          mkdir -p "${DIR}"
          cp "target/${TARGET}/release/${BIN}${EXT}" "${DIR}/"
          cp LICENSE "${DIR}/" 2>/dev/null || true
          if [[ "$TARGET" == *"windows"* ]]; then
            7z a -tzip "${DIR}.zip" "${DIR}"
            echo "archive=${DIR}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${DIR}.tar.gz" "${DIR}"
            echo "archive=${DIR}.tar.gz" >> "$GITHUB_OUTPUT"
          fi
        id: archive

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.archive.outputs.archive }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [create, build]
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
