name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross deps (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RELEASE_VERSION: ${{ github.ref_name }}

      - name: Prepare dist
        run: mkdir -p dist

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/betterssh dist/
          cd dist
          tar czf ../betterssh-${{ matrix.target }}.tar.gz betterssh

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cp target/${{ matrix.target }}/release/betterssh dist/
          cd dist
          tar czf ../betterssh-${{ matrix.target }}.tar.gz betterssh

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\betterssh.exe dist\
          cd dist
          tar czf ..\betterssh-${{ matrix.target }}.tar.gz betterssh.exe

      - uses: actions/upload-artifact@v4
        with:
          name: betterssh-${{ matrix.target }}
          path: betterssh-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: betterssh-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: betterssh-*.tar.gz
          generate_release_notes: true
