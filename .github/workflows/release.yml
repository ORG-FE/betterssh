name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross deps (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare binary
        run: |
          cp target/${{ matrix.target }}/release/betterssh${{ runner.os == 'Windows' && '.exe' || '' }} \
            betterssh-${{ matrix.target }}${{ runner.os == 'Windows' && '.exe' || '' }}

      - uses: actions/upload-artifact@v5
        with:
          name: betterssh-${{ matrix.target }}
          path: betterssh-${{ matrix.target }}${{ runner.os == 'Windows' && '.exe' || '' }}

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: betterssh-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la

      - name: Make executable (linux/macos)
        run: chmod +x betterssh-*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: betterssh-*
          generate_release_notes: true
